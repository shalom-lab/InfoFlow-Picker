name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Capture version from tag
        id: version
        run: |
          RAW="${GITHUB_REF_NAME}"
          STRIPPED="${RAW#v}"
          echo "value=${STRIPPED}" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version with tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: npm run version:bump

      - name: Build extensions
        run: npm run build

      - name: Pack Chrome build
        run: |
          cd dist/chrome
          zip -r "../../InfoFlow-Extractor-chrome-${{ steps.version.outputs.value }}.zip" .

      - name: Pack Firefox build
        run: |
          cd dist/firefox
          zip -r "../../InfoFlow-Extractor-firefox-${{ steps.version.outputs.value }}.zip" .

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v5
        with:
          name: chrome-${{ steps.version.outputs.value }}
          path: InfoFlow-Extractor-chrome-${{ steps.version.outputs.value }}.zip

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v5
        with:
          name: firefox-${{ steps.version.outputs.value }}
          path: InfoFlow-Extractor-firefox-${{ steps.version.outputs.value }}.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: InfoFlow Picker ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            InfoFlow-Extractor-chrome-${{ steps.version.outputs.value }}.zip
            InfoFlow-Extractor-firefox-${{ steps.version.outputs.value }}.zip
