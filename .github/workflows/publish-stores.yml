name: Publish to Web Stores

on:
  push:
    tags:
      - 'v*'
  # 手动触发：用于「把某个已发布的 tag 版本」推到商店（默认取最新 v* tag）
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag and version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG=$(git describe --tags --abbrev=0 --match "v*")
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Checkout tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout ${{ steps.tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Sync package.json version with tag
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: npm run version:bump

      - name: Build extensions
        run: npm run build

      - name: Pack Chrome build
        run: |
          cd dist/chrome
          zip -r "../../InfoFlow-Extractor-chrome-${{ steps.tag.outputs.version }}.zip" .

      - name: Upload and publish to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          if [ -z "$EXTENSION_ID" ] || [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ] || [ -z "$REFRESH_TOKEN" ]; then
            echo "Missing Chrome Web Store secrets. Configure CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, and CHROME_REFRESH_TOKEN in repository secrets."
            exit 1
          fi
          # No subcommand = upload + publish (replaces deprecated --auto-publish).
          # Bare `upload` only creates a draft and leaves "已发布" on the old version.
          npx chrome-webstore-upload-cli \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN" \
            --source "InfoFlow-Extractor-chrome-${{ steps.tag.outputs.version }}.zip"
