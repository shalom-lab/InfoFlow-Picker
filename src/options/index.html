<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>InfoFlow Settings</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        margin: 0 auto;
        padding: 24px 18px 32px;
        max-width: 760px;
        color: #0f172a;
        background: radial-gradient(circle at top left, #eef2ff 0, #f9fafb 50%, #fdf2ff 100%);
      }
      h1 {
        margin-top: 0;
        margin-bottom: 4px;
        font-size: 22px;
        font-weight: 650;
        letter-spacing: 0.01em;
        color: #0f172a;
      }
      .settings-subtitle {
        margin-bottom: 18px;
        font-size: 13px;
        color: #64748b;
      }
      label {
        display: block;
        font-size: 13px;
        margin-bottom: 4px;
        color: #4b5563;
      }
      .settings-card {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 16px;
        padding: 18px 18px 16px;
        box-shadow:
          0 20px 45px rgba(15, 23, 42, 0.22),
          0 0 0 1px rgba(148, 163, 184, 0.2);
        border: 1px solid rgba(226, 232, 240, 0.9);
      }
      .settings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px 24px;
        margin-top: 10px;
      }
      .field-group {
        display: flex;
        flex-direction: column;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #111827;
        margin-bottom: 0;
        box-sizing: border-box;
        font-size: 13px;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.55);
      }
      textarea {
        min-height: 110px;
      }
      .actions-row {
        margin-top: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      button {
        padding: 10px 20px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: white;
        font-size: 14px;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 12px 24px rgba(79, 70, 229, 0.35);
        transition: background 0.18s ease, transform 0.12s ease,
          box-shadow 0.12s ease, filter 0.1s ease;
      }
      button:hover {
        filter: brightness(1.04);
        transform: translateY(-1px);
        box-shadow: 0 16px 32px rgba(79, 70, 229, 0.45);
      }
      button:active {
        transform: translateY(0);
        box-shadow: 0 8px 18px rgba(79, 70, 229, 0.3);
      }
      .status {
        font-size: 12px;
        color: #6b7280;
      }
      .star-hint {
        font-size: 12px;
        color: #9ca3af;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
    </style>
  </head>
  <body>
    <div class="settings-card">
      <h1 id="options-title"></h1>
      <div class="settings-subtitle">
        <a
          href="https://github.com/shalom-lab/InfoFlow-Picker"
          target="_blank"
          rel="noreferrer"
          style="color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;"
        >
          <span>⭐</span>
          <span>Star shalom-lab/InfoFlow-Picker 支持一下</span>
        </a>
      </div>
      <div class="settings-grid">
        <div class="field-group">
          <label for="language" id="language-label"></label>
          <select id="language">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="field-group">
          <label for="github-token" id="github-token-label"></label>
          <input id="github-token" type="password" placeholder="ghp_xxx" />
        </div>
        <div class="field-group">
          <label for="github-owner" id="github-owner-label"></label>
          <input id="github-owner" type="text" placeholder="owner" />
        </div>
        <div class="field-group">
          <label for="github-repo" id="github-repo-label"></label>
          <input id="github-repo" type="text" placeholder="repo" />
        </div>
        <div class="field-group">
          <label for="github-branch" id="github-branch-label"></label>
          <input id="github-branch" type="text" placeholder="master" />
        </div>
        <div class="field-group">
          <label for="github-base-path" id="github-base-path-label"></label>
          <input id="github-base-path" type="text" placeholder="infoflow-data" />
        </div>
        <div class="field-group">
          <label for="format" id="format-label"></label>
          <select id="format">
            <option value="md">Markdown (.md)</option>
            <option value="json">JSON (.json)</option>
            <option value="csv">CSV (.csv)</option>
          </select>
        </div>
        <div class="field-group" style="grid-column: 1 / -1;">
          <label for="categories" id="categories-label"></label>
          <textarea id="categories"></textarea>
        </div>
      </div>
      <div class="actions-row">
        <div class="star-hint">
          <span>⭐</span>
          <span>喜欢的话，欢迎在 GitHub 点个 Star</span>
        </div>
        <button id="save-settings"></button>
      </div>
      <div class="status" id="options-status"></div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
