<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>InfoFlow Picker</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        margin: 0;
        padding: 0;
        width: 330px;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, #eef2ff 0, #f9fafb 48%, #fdf2ff 100%);
        color: #0f172a;
      }
      .card {
        position: relative;
        background: rgba(255, 255, 255, 0.94);
        border-radius: 16px;
        padding: 12px 12px 14px;
        box-shadow:
          0 20px 48px rgba(15, 23, 42, 0.22),
          0 0 0 1px rgba(148, 163, 184, 0.14);
        border: 1px solid rgba(226, 232, 240, 0.9);
        overflow: hidden;
      }
      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #4f46e5, #7c3aed, #ec4899);
        opacity: 0.12;
        pointer-events: none;
      }
      .card-inner {
        position: relative;
        z-index: 1;
      }
      h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0.01em;
        color: #0f172a;
      }
      label {
        display: block;
        margin: 4px 0 4px;
        font-size: 11px;
        letter-spacing: 0.01em;
        color: #6b7280;
      }
      textarea {
        width: 100%;
        min-height: 110px;
        resize: vertical;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #111827;
        box-sizing: border-box;
        margin-bottom: 8px;
        font-size: 12px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        font-family: inherit;
      }
      textarea:hover {
        border-color: #cbd5e1;
      }
      textarea:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.2);
      }
      textarea.textarea-small {
        min-height: 44px;
      }
      select,
      button {
        width: 100%;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid #e5e7eb;
        font-size: 13px;
        box-sizing: border-box;
      }
      select {
        margin-bottom: 8px;
        background: #ffffff;
        color: #111827;
        cursor: pointer;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      select:hover {
        border-color: #cbd5e1;
      }
      select:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.55);
      }
      button {
        margin-top: 4px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border: none;
        color: #ffffff;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.18s ease, transform 0.12s ease,
          box-shadow 0.12s ease, filter 0.1s ease;
        box-shadow: 0 12px 22px rgba(79, 70, 229, 0.35);
      }
      button:hover:not(:disabled) {
        filter: brightness(1.04);
        transform: translateY(-1px);
        box-shadow: 0 16px 30px rgba(79, 70, 229, 0.45);
      }
      button:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3);
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        box-shadow: none;
      }
      .status {
        margin-top: 6px;
        font-size: 11px;
        text-align: center;
        color: #94a3b8;
        min-height: 16px;
        transition: color 0.18s ease;
      }
      .status[data-tone='muted'] {
        color: #94a3b8;
      }
      .status[data-tone='progress'] {
        color: #4338ca;
      }
      .status[data-tone='success'] {
        color: #059669;
      }
      .status[data-tone='error'] {
        color: #dc2626;
      }
      .header {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
      }
      .header-left {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 3px;
      }
      .header-sub {
        font-size: 11px;
        color: #9ca3af;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .icon-button {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: rgba(255, 255, 255, 0.95);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        cursor: pointer;
        color: #4b5563;
        box-shadow: 0 2px 4px rgba(15, 23, 42, 0.1);
        transition: all 0.2s ease;
      }
      .icon-button:hover {
        background: #f8fafc;
        border-color: #cbd5e1;
        transform: translateY(-1px);
        box-shadow: 0 4px 6px rgba(15, 23, 42, 0.15);
      }
      .icon-button:active {
        background: #f1f5f9;
        transform: translateY(0);
        box-shadow: 0 2px 4px rgba(15, 23, 42, 0.12);
      }
      .view {
        display: none;
      }
      .view.active {
        display: block;
      }
      .settings-section {
        margin-bottom: 10px;
      }
      .settings-section:last-child {
        margin-bottom: 0;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #111827;
        box-sizing: border-box;
        margin-bottom: 8px;
        font-size: 12px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      input[type="text"]:hover,
      input[type="password"]:hover {
        border-color: #cbd5e1;
      }
      input[type="text"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.2);
      }
      .settings-categories {
        min-height: 80px;
      }
      #image-preview-container {
        display: none;
      }
      #image-preview {
        display: block;
        max-width: 100%;
        max-height: 200px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        object-fit: contain;
        background: #f9fafb;
      }
      #image-group-panel {
        display: none;
        margin-bottom: 8px;
      }
      #image-group-hint {
        font-size: 11px;
        color: #64748b;
        margin: 0 0 6px;
      }
      #image-group-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin-bottom: 8px;
      }
      .image-group-item {
        position: relative;
        aspect-ratio: 1;
        border-radius: 8px;
        overflow: hidden;
        border: 2px solid #e5e7eb;
        cursor: pointer;
        background: #f9fafb;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .image-group-item.selected {
        border-color: #4f46e5;
        box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.25);
      }
      .image-group-item.primary {
        border-color: #0ea5e9;
      }
      .image-group-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .image-group-item .image-group-check {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 18px;
        height: 18px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #cbd5e1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: transparent;
        line-height: 1;
      }
      .image-group-item.selected .image-group-check {
        background: #4f46e5;
        border-color: #4f46e5;
        color: #fff;
      }
      .image-group-item .image-group-primary-tag {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        font-size: 9px;
        text-align: center;
        padding: 2px 0;
        background: rgba(14, 165, 233, 0.85);
        color: #fff;
        display: none;
      }
      .image-group-item.primary .image-group-primary-tag {
        display: block;
      }
      #image-group-actions {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      #image-group-actions button {
        flex: 1;
        margin-top: 0;
        padding: 6px 8px;
        font-size: 11px;
        font-weight: 500;
        border-radius: 8px;
        background: #f8fafc;
        color: #475569;
        border: 1px solid #e2e8f0;
        box-shadow: none;
      }
      #image-group-actions button:hover:not(:disabled) {
        background: #f1f5f9;
        transform: none;
        box-shadow: none;
      }
      
      /* 图片选择按钮美化 */
      #image-select-btn {
        width: 100%;
        margin-bottom: 8px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 500;
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        border: 2px dashed #0ea5e9;
        border-radius: 10px;
        cursor: pointer;
        color: #0369a1;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow: 0 2px 4px rgba(14, 165, 233, 0.1);
      }
      #image-select-btn:hover {
        background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
        border-color: #0284c7;
        color: #075985;
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(14, 165, 233, 0.15);
      }
      #image-select-btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 4px rgba(14, 165, 233, 0.1);
      }
      #image-select-btn::before {
        content: '📷 ';
        font-size: 16px;
        line-height: 1;
      }
      
      /* 图片移除按钮美化 */
      #image-remove-btn {
        width: 100%;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 500;
        background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
        color: #dc2626;
        border: 1px solid #fecaca;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow: 0 2px 4px rgba(220, 38, 38, 0.1);
      }
      #image-remove-btn:hover {
        background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
        border-color: #fca5a5;
        color: #b91c1c;
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(220, 38, 38, 0.15);
      }
      #image-remove-btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 4px rgba(220, 38, 38, 0.1);
      }
      #image-remove-btn::before {
        content: '🗑️ ';
        font-size: 14px;
        line-height: 1;
      }
      
      /* 标签美化 */
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 6px 0 4px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.01em;
        color: #475569;
      }
      
      /* 为不同标签添加图标 */
      #content-label::before {
        content: '📝';
        font-size: 13px;
      }
      #category-label::before {
        content: '📁';
        font-size: 13px;
      }
      #source-url-label::before {
        content: '🔗';
        font-size: 13px;
      }
      #image-label::before {
        content: '🖼️';
        font-size: 13px;
      }
      #notes-label::before {
        content: '📋';
        font-size: 13px;
      }
      
      /* 保存按钮美化 */
      #save-btn {
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border: none;
        color: #ffffff;
        font-weight: 600;
        padding: 10px 16px;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      #save-btn::before {
        content: '💾 ';
        font-size: 16px;
        line-height: 1;
      }
      
      /* 设置按钮美化 */
      #save-settings-btn {
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border: none;
        color: #ffffff;
        font-weight: 600;
        padding: 10px 16px;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      #save-settings-btn::before {
        content: '✅ ';
        font-size: 16px;
        line-height: 1;
      }
      
      /* 设置视图标签图标 */
      #settings-language-label::before {
        content: '🌐';
        font-size: 13px;
      }
      #settings-github-token-label::before {
        content: '🔑';
        font-size: 13px;
      }
      #settings-github-owner-label::before {
        content: '👤';
        font-size: 13px;
      }
      #settings-github-repo-label::before {
        content: '📦';
        font-size: 13px;
      }
      #settings-github-branch-label::before {
        content: '🌿';
        font-size: 13px;
      }
      #settings-github-base-path-label::before {
        content: '📂';
        font-size: 13px;
      }
      #settings-format-label::before {
        content: '📄';
        font-size: 13px;
      }
      #settings-categories-label::before {
        content: '📋';
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-inner">
        <div class="header">
          <div class="header-left">
            <h1 id="title"></h1>
            <div class="header-sub">
              <a
                href="https://github.com/shalom-lab/InfoFlow-Picker"
                target="_blank"
                rel="noreferrer"
                style="color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 3px;"
              >
                <span>⭐</span>
                <span style="font-size: 11px;">Star shalom-lab/InfoFlow-Picker</span>
              </a>
            </div>
          </div>
          <div class="header-actions">
            <button id="options-btn" class="icon-button" title="Settings">⚙️</button>
          </div>
        </div>

        <!-- 保存视图 -->
        <div id="save-view" class="view active">
        <label for="content" id="content-label"></label>
        <textarea id="content" placeholder=""></textarea>
        <label for="category" id="category-label"></label>
        <select id="category"></select>
        <label for="source-url" id="source-url-label"></label>
        <textarea id="source-url" class="textarea-small" placeholder=""></textarea>
        <label for="image" id="image-label"></label>
        <div id="image-container" style="margin-bottom: 8px;">
          <input type="file" id="image-input" accept="image/*" style="display: none;" />
          <button type="button" id="image-select-btn"></button>
          <div id="image-group-panel">
            <p id="image-group-hint"></p>
            <div id="image-group-grid"></div>
            <div id="image-group-actions">
              <button type="button" id="image-group-select-all"></button>
              <button type="button" id="image-group-select-current"></button>
            </div>
          </div>
          <div id="image-preview-container" style="display: none;">
            <img id="image-preview" />
            <button type="button" id="image-remove-btn"></button>
          </div>
        </div>
        <label for="notes" id="notes-label"></label>
        <textarea id="notes" class="textarea-small" placeholder=""></textarea>
          <button id="save-btn"></button>
          <div class="status" id="status" aria-live="polite"></div>
          <button type="button" id="retry-sync-btn" style="display: none; margin-top: 6px; width: 100%; font-size: 12px;"></button>
        </div>

        <!-- 设置视图 -->
        <div id="settings-view" class="view">
          <div class="settings-section">
            <label for="settings-language" id="settings-language-label"></label>
            <select id="settings-language">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <div class="settings-section">
            <label for="settings-github-token" id="settings-github-token-label"></label>
            <input id="settings-github-token" type="password" placeholder="ghp_xxx" />
          </div>
          <div class="settings-section">
            <label for="settings-github-owner" id="settings-github-owner-label"></label>
            <input id="settings-github-owner" type="text" placeholder="owner" />
          </div>
          <div class="settings-section">
            <label for="settings-github-repo" id="settings-github-repo-label"></label>
            <input id="settings-github-repo" type="text" placeholder="repo" />
          </div>
          <div class="settings-section">
            <label for="settings-github-branch" id="settings-github-branch-label"></label>
            <input id="settings-github-branch" type="text" placeholder="master" />
          </div>
          <div class="settings-section">
            <label for="settings-github-base-path" id="settings-github-base-path-label"></label>
            <input id="settings-github-base-path" type="text" placeholder="infoflow-data" />
          </div>
          <div class="settings-section">
            <label for="settings-format" id="settings-format-label"></label>
            <select id="settings-format">
              <option value="json+md">JSON + Markdown</option>
              <option value="json">JSON only</option>
              <option value="md">Markdown only</option>
            </select>
          </div>
          <div class="settings-section">
            <label for="settings-categories" id="settings-categories-label"></label>
            <textarea id="settings-categories" class="settings-categories"></textarea>
          </div>
          <div class="status" id="token-hint" style="margin-top: 0; margin-bottom: 4px; font-size: 10px; text-align: left;"></div>
          <button id="save-settings-btn"></button>
          <div class="status" id="settings-status" aria-live="polite"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
