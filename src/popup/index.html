<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>InfoFlow Picker</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        margin: 0;
        padding: 0;
        width: 330px;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, #eef2ff 0, #f9fafb 48%, #fdf2ff 100%);
        color: #0f172a;
      }
      .card {
        position: relative;
        background: rgba(255, 255, 255, 0.94);
        border-radius: 16px;
        padding: 12px 12px 14px;
        box-shadow:
          0 20px 48px rgba(15, 23, 42, 0.22),
          0 0 0 1px rgba(148, 163, 184, 0.14);
        border: 1px solid rgba(226, 232, 240, 0.9);
        overflow: hidden;
      }
      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #4f46e5, #7c3aed, #ec4899);
        opacity: 0.12;
        pointer-events: none;
      }
      .card-inner {
        position: relative;
        z-index: 1;
      }
      h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0.01em;
        color: #0f172a;
      }
      label {
        display: block;
        margin: 4px 0 4px;
        font-size: 11px;
        letter-spacing: 0.01em;
        color: #6b7280;
      }
      textarea {
        width: 100%;
        min-height: 110px;
        resize: vertical;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #111827;
        box-sizing: border-box;
        margin-bottom: 8px;
        font-size: 12px;
      }
      textarea:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.55);
      }
      textarea.textarea-small {
        min-height: 44px;
      }
      select,
      button {
        width: 100%;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid #e5e7eb;
        font-size: 13px;
        box-sizing: border-box;
      }
      select {
        margin-bottom: 8px;
        background: #ffffff;
        color: #111827;
      }
      button {
        margin-top: 4px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border: none;
        color: #ffffff;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.18s ease, transform 0.12s ease,
          box-shadow 0.12s ease, filter 0.1s ease;
        box-shadow: 0 12px 22px rgba(79, 70, 229, 0.35);
      }
      button:hover:not(:disabled) {
        filter: brightness(1.04);
        transform: translateY(-1px);
        box-shadow: 0 16px 30px rgba(79, 70, 229, 0.45);
      }
      button:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3);
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        box-shadow: none;
      }
      .status {
        margin-top: 6px;
        font-size: 11px;
        text-align: center;
        color: #94a3b8;
        min-height: 16px;
        transition: color 0.18s ease;
      }
      .status[data-tone='muted'] {
        color: #94a3b8;
      }
      .status[data-tone='progress'] {
        color: #4338ca;
      }
      .status[data-tone='success'] {
        color: #059669;
      }
      .status[data-tone='error'] {
        color: #dc2626;
      }
      .header {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
      }
      .header-left {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 3px;
      }
      .header-sub {
        font-size: 11px;
        color: #9ca3af;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .icon-button {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid #e5e7eb;
        background: rgba(255, 255, 255, 0.9);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        cursor: pointer;
        color: #4b5563;
        box-shadow: 0 2px 4px rgba(15, 23, 42, 0.12);
      }
      .icon-button:hover {
        background: #f3f4f6;
      }
      .icon-button:active {
        background: #e5e7eb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.16);
      }
      .view {
        display: none;
      }
      .view.active {
        display: block;
      }
      .settings-section {
        margin-bottom: 10px;
      }
      .settings-section:last-child {
        margin-bottom: 0;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #111827;
        box-sizing: border-box;
        margin-bottom: 8px;
        font-size: 12px;
      }
      input[type="text"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.55);
      }
      .settings-categories {
        min-height: 80px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-inner">
        <div class="header">
          <div class="header-left">
            <h1 id="title"></h1>
            <div class="header-sub">
              <a
                href="https://github.com/shalom-lab/InfoFlow"
                target="_blank"
                rel="noreferrer"
                style="color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 3px;"
              >
                <span>⭐</span>
                <span style="font-size: 11px;">Star shalom-lab/InfoFlow</span>
              </a>
            </div>
          </div>
          <div class="header-actions">
            <button id="options-btn" class="icon-button" title="Settings">⚙</button>
          </div>
        </div>

        <!-- 保存视图 -->
        <div id="save-view" class="view active">
        <label for="source-url" id="source-url-label"></label>
        <textarea id="source-url" class="textarea-small" placeholder=""></textarea>
        <label for="selection" id="selection-label"></label>
        <textarea id="selection" placeholder=""></textarea>
        <label for="notes" id="notes-label"></label>
        <textarea id="notes" class="textarea-small" placeholder=""></textarea>
        <label for="category" id="category-label"></label>
        <select id="category"></select>
          <button id="save-btn"></button>
          <div class="status" id="status" aria-live="polite"></div>
        </div>

        <!-- 设置视图 -->
        <div id="settings-view" class="view">
          <div class="settings-section">
            <label for="settings-language" id="settings-language-label"></label>
            <select id="settings-language">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <div class="settings-section">
            <label for="settings-github-token" id="settings-github-token-label"></label>
            <input id="settings-github-token" type="password" placeholder="ghp_xxx" />
          </div>
          <div class="settings-section">
            <label for="settings-github-owner" id="settings-github-owner-label"></label>
            <input id="settings-github-owner" type="text" placeholder="owner" />
          </div>
          <div class="settings-section">
            <label for="settings-github-repo" id="settings-github-repo-label"></label>
            <input id="settings-github-repo" type="text" placeholder="repo" />
          </div>
          <div class="settings-section">
            <label for="settings-github-branch" id="settings-github-branch-label"></label>
            <input id="settings-github-branch" type="text" placeholder="master" />
          </div>
          <div class="settings-section">
            <label for="settings-github-base-path" id="settings-github-base-path-label"></label>
            <input id="settings-github-base-path" type="text" placeholder="infoflow-data" />
          </div>
          <div class="settings-section">
            <label for="settings-format" id="settings-format-label"></label>
            <select id="settings-format">
              <option value="md">Markdown (.md)</option>
              <option value="json">JSON (.json)</option>
              <option value="csv">CSV (.csv)</option>
            </select>
          </div>
          <div class="settings-section">
            <label for="settings-categories" id="settings-categories-label"></label>
            <textarea id="settings-categories" class="settings-categories"></textarea>
          </div>
          <div class="status" id="token-hint" style="margin-top: 0; margin-bottom: 4px; font-size: 10px; text-align: left;"></div>
          <button id="save-settings-btn"></button>
          <div class="status" id="settings-status" aria-live="polite"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
